name: Publish Python package

on:
  push:
    tags:
      - "python-v*"

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      # PyPI Trusted Publishing (see pypa/gh-action-pypi-publish below): this
      # job exchanges a GitHub OIDC token directly for permission to upload,
      # so no PYPI_API_TOKEN secret needs to exist at all. The trusted
      # publisher configured on pypi.org for signet-client must reference
      # this exact repo (bytepunx/signet-clients), workflow filename
      # (publish-python.yml), and no GitHub environment restriction (none
      # was set when the publisher was configured, so this job doesn't
      # declare one either — the two must match exactly).
      id-token: write
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: buf generate
        run: buf generate

      - name: Install package (dev + workload extras) and build tooling
        run: pip install -e ".[dev,workload]" build

      - name: pytest
        run: pytest

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # This action resolves packages-dir relative to the workspace
          # root, not this job's working-directory default (that only
          # applies to `run:` steps) — the build step above ran with
          # working-directory: python, so its output landed in python/dist.
          packages-dir: python/dist
