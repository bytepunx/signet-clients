name: Publish C# package

on:
  push:
    tags:
      - "csharp-v*"

permissions:
  contents: read

jobs:
  publish:
    name: Build, test, and publish to NuGet
    runs-on: ubuntu-latest
    permissions:
      # NuGet Trusted Publishing (see NuGet/login below): this job exchanges
      # a GitHub OIDC token for a short-lived (1 hour) NuGet API key, so no
      # long-lived NUGET_API_KEY secret needs to exist at all. The trusted
      # publishing policy on nuget.org must reference this exact repo
      # (bytepunx/signet-clients) and workflow filename (publish-csharp.yml).
      id-token: write
    defaults:
      run:
        working-directory: csharp
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Set up buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: buf generate
        run: buf generate

      - name: dotnet build
        run: dotnet build

      - name: dotnet test
        run: dotnet test

      - name: dotnet pack
        # Packs only the library itself, not SignetClient.Tests or the
        # echo example — SignetClient.sln also contains both of those, and
        # `dotnet pack` on the whole solution would try (and fail) to
        # produce a NuGet package for the non-packable test/example projects.
        run: dotnet pack SignetClient.csproj --configuration Release --output ./nupkg

      # Exchanges this job's GitHub OIDC token for a short-lived nuget.org
      # API key via the trusted publishing policy configured there — no
      # stored secret to leak or rotate. "user" is the nuget.org profile
      # name the policy is owned by (the bytepunx organization's nuget.org
      # account name, not a GitHub username or email address).
      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: dotnet nuget push
        run: dotnet nuget push "./nupkg/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json
