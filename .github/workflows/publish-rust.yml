name: Publish Rust crate

on:
  push:
    tags:
      - "rust-v*"

permissions:
  contents: read

jobs:
  publish:
    name: Build, verify, and publish to crates.io
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Set up buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: buf generate
        run: buf generate

      - name: cargo build
        run: cargo build

      - name: cargo test
        run: cargo test --features spiffe-workload

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        # --allow-dirty: src/gen is gitignored (see the include comment in
        # Cargo.toml) — buf generate's freshly-written output is untracked,
        # which cargo's default git-cleanliness check treats as "dirty" and
        # refuses to publish. This doesn't change what gets packaged (that's
        # still governed entirely by Cargo.toml's `include`); it only skips
        # the check that assumes every publishable file is git-committed,
        # which doesn't hold here by design.
        run: cargo publish --allow-dirty
