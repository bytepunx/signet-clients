name: Publish Rust crate

on:
  push:
    tags:
      - "rust-v*"

permissions:
  contents: read

jobs:
  publish:
    name: Build, verify, and publish to crates.io
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Set up buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: buf generate
        run: buf generate

      - name: cargo build
        run: cargo build

      - name: cargo test
        run: cargo test --features spiffe-workload

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
