version: v2
plugins:
  # ts-proto generates idiomatic TypeScript types plus an optional @grpc/grpc-js
  # client in one pass, so no separate grpc plugin is needed for Node targets.
  - remote: buf.build/community/stephenh-ts-proto
    out: src/gen
    opt:
      - outputServices=grpc-js
      - esModuleInterop=true
      - useExactTypes=false
      # tsconfig.json uses moduleResolution=NodeNext (ESM), which requires
      # explicit extensions on relative imports.
      - importSuffix=.js
# Pinned independently of signet's own buf.gen.yaml and the other language
# clients in this repo. Update to a specific :vX.Y.Z label once tagged
# releases exist.
inputs:
  - module: buf.build/bytepunx/signet-proto
