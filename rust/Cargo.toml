[package]
name = "signet-client"
version = "0.1.0"
edition = "2021"
description = "Rust client for signet, generated from bytepunx/signet-proto"
license = "Apache-2.0"

[dependencies]
tonic = "0.14"
tonic-prost = "0.14"
prost = "0.14"
prost-types = "0.14"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
